aid: defense-nuclear-facilities-safety-board
name: Defense Nuclear Facilities Safety Board
description: >-
  The Defense Nuclear Facilities Safety Board (DNFSB) is an independent
  organization within the executive branch of the United States Government
  chartered to provide recommendations and advice to the President and the
  Secretary of Energy on public health and safety issues at Department of
  Energy defense nuclear facilities. The DNFSB publishes recommendations,
  letters, technical reports, weekly site-representative reports, and
  rulemaking notices through its public website and FOIA reading room. The
  agency does not publish a developer-oriented API; programmatic users rely
  on document downloads, RSS feeds, and Federal Register integrations.
